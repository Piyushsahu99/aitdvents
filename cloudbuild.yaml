steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'VITE_APP_URL=${_VITE_APP_URL}'
      - '--build-arg'
      - 'VITE_SUPABASE_URL=${_VITE_SUPABASE_URL}'
      - '--build-arg'
      - 'VITE_SUPABASE_ANON_KEY=${_VITE_SUPABASE_ANON_KEY}'
      - '--build-arg'
      - 'NODE_ENV=production'
      - '-t'
      - 'gcr.io/${PROJECT_ID}/aitd-events:${SHORT_SHA}'
      - '-t'
      - 'gcr.io/${PROJECT_ID}/aitd-events:latest'
      - '.'

  # Push the image to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/${PROJECT_ID}/aitd-events:${SHORT_SHA}'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/${PROJECT_ID}/aitd-events:latest'

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'aitd-events-platform'
      - '--image'
      - 'gcr.io/${PROJECT_ID}/aitd-events:${SHORT_SHA}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--port'
      - '8080'

# Timeout for the build (30 minutes)
timeout: 1800s

# Substitution variables (define these in Cloud Build triggers)
substitutions:
  _REGION: 'us-central1'
  _VITE_APP_URL: 'https://your-domain.com'
  _VITE_SUPABASE_URL: 'your-supabase-url'
  _VITE_SUPABASE_ANON_KEY: 'your-supabase-anon-key'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
